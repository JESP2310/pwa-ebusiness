<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>WooShop - Loja</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='Arial'%3EW%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="app">
        <header class="header">
            <h1>🛒 WooShop</h1>
            <div class="header-actions">
                <button id="btnTema" class="btn-tema" title="Alternar tema">🌙</button>
                <button id="btnCarrinho" class="btn-carrinho" title="Carrinho">
                    🛒 <span id="badgeCarrinho" class="badge hidden">0</span>
                </button>
            </div>
        </header>

        <section class="form-section busca-section">
            <div class="input-group">
                <input type="text" id="inputBusca" placeholder="Buscar produtos..." maxlength="100">
            </div>
        </section>

        <section class="categorias-section">
            <div id="listaCategorias" class="lista-categorias">
                <button class="cat-btn active" data-cat="todas">Todos</button>
            </div>
        </section>

        <section id="viewHome" class="view active">
            <div id="gridProdutos" class="grid-produtos"></div>
            <div id="vazio" class="vazio hidden">
                <span class="vazio-icon">📦</span>
                <p>Nenhum produto encontrado</p>
            </div>
        </section>

        <section id="viewProduto" class="view">
            <button class="btn-voltar" onclick="app.voltar()">← Voltar</button>
            <div id="detalheProduto" class="detalhe-produto"></div>
        </section>

        <section id="viewCarrinho" class="view">
            <button class="btn-voltar" onclick="app.mostrarView('home')">← Continuar comprando</button>
            <h2>🛒 Carrinho</h2>
            <div id="listaCarrinho" class="lista-carrinho"></div>
            <div id="totalCarrinho" class="total-carrinho"></div>
            <button id="btnFinalizar" class="btn-submit">Finalizar Compra no Site</button>
        </section>

        <section class="stats">
            <div class="stat">
                <span id="totalProdutos">0</span>
                <small>Produtos</small>
            </div>
            <div class="stat">
                <span id="totalCarrinho">0</span>
                <small>No Carrinho</small>
            </div>
        </section>

        <footer class="footer">
            <p>WooShop PWA</p>
        </footer>
    </div>

    <div id="modalProduto" class="modal">
        <div class="modal-content">
            <button class="btn-fechar" onclick="app.fecharModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/db.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
